name: worm_world
description: Interactive 3D Worm Flutter App with smooth navigation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 3D Model Viewer — renders .glb / .gltf files in a WebView
  model_viewer_plus: ^1.7.0

  # Smooth page transitions and indicator
  smooth_page_indicator: ^1.1.0

  # Audio playback for interaction sound effects
  audioplayers: ^5.2.1

  # Lottie animations (optional: for 2D fallback overlays)
  lottie: ^3.1.0

  # Shared preferences for lightweight state
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    # Place your worm.glb file inside assets/models/
    # Place sound effects inside assets/sounds/
    - assets/models/
    - assets/sounds/
    - assets/images/
